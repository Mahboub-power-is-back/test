<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SubfinderX | Mahboub Million</title>
    <link rel="manifest" href="data:application/manifest+json,{
        \"name\":\"SubfinderX\",
        \"short_name\":\"SubfinderX\",
        \"description\":\"Professional subdomain discovery & port scanner\",
        \"start_url\":\".\",
        \"display\":\"standalone\",
        \"theme_color\":\"#0a0c15\",
        \"background_color\":\"#0a0c15\",
        \"icons\":[{
            \"src\":\"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%230a0c15'/%3E%3Ccircle cx='50' cy='50' r='40' fill='none' stroke='%2300d4ff' stroke-width='4'/%3E%3Cpath d='M35 50 L65 50 M50 35 L50 65' stroke='%23ff6a00' stroke-width='4'/%3E%3C/svg%3E\",
            \"sizes\":\"any\",
            \"type\":\"image/svg+xml\"
        }]
    }">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%230a0c15'/%3E%3Ccircle cx='50' cy='50' r='40' fill='none' stroke='%2300d4ff' stroke-width='4'/%3E%3C/svg%3E">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:#0a0c15;color:#fff;overflow-x:hidden}
        .splash{position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(145deg,#060914,#0a0f1e);display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:9999;transition:opacity 0.5s}
        .splash.hide{opacity:0;pointer-events:none}
        .splash-logo{width:80px;height:80px;background:linear-gradient(135deg,#00d4ff20,#ff6a0020);border-radius:28px;display:flex;align-items:center;justify-content:center;margin-bottom:1.5rem;animation:pulse 1.2s infinite}
        .splash-logo i{font-size:3rem;background:linear-gradient(135deg,#00d4ff,#ffaa44);-webkit-background-clip:text;background-clip:text;color:transparent}
        @keyframes pulse{0%{transform:scale(1)}70%{transform:scale(1.05)}100%{transform:scale(1)}}
        .splash h2{background:linear-gradient(125deg,#fff,#7dd3fc);-webkit-background-clip:text;background-clip:text;color:transparent}
        .container{max-width:1400px;margin:0 auto;padding:1rem}
        .header{background:rgba(15,23,42,0.6);backdrop-filter:blur(14px);border-radius:2rem;padding:1rem 2rem;margin-bottom:2rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem}
        .brand{display:flex;align-items:center;gap:0.8rem}
        .brand i{font-size:2rem;color:#00d4ff}
        .brand h1{font-size:1.5rem;background:linear-gradient(115deg,#fff,#7dd3fc);-webkit-background-clip:text;background-clip:text;color:transparent}
        .owner-badge{background:#ff6a001a;border:1px solid #ff6a00;border-radius:2rem;padding:0.3rem 1.2rem;font-size:0.8rem}
        .telegram-btn{background:#1e293b;border-radius:2rem;padding:0.45rem 1.3rem;color:#94a3f8;text-decoration:none;display:inline-flex;align-items:center;gap:0.5rem;border:1px solid #2d3a5e}
        .card{background:rgba(12,18,34,0.7);backdrop-filter:blur(18px);border-radius:2rem;padding:2rem;border:1px solid rgba(0,212,255,0.2)}
        .input-group{display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:1.5rem}
        .domain-input{flex:2;background:#0f172f;border:1px solid #2d3a60;border-radius:3rem;padding:0.9rem 1.5rem;color:#fff;font-size:1rem}
        .btn-scan{background:linear-gradient(105deg,#0f2b4f,#0f172a);border:1px solid #00d4ff;border-radius:3rem;padding:0 2rem;font-weight:600;color:#b9e6ff;cursor:pointer}
        .toggle-group{display:flex;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap}
        .toggle-item{background:#0e162b;border-radius:2rem;padding:0.4rem 1rem;border:1px solid #293456}
        .tools-bar{display:flex;gap:0.8rem;flex-wrap:wrap;margin:1rem 0;padding-top:1rem;border-top:1px solid #1e2a4a}
        .tool-btn{background:#111827;border:1px solid #2a3a60;border-radius:2rem;padding:0.45rem 1.2rem;font-size:0.8rem;color:#b9c8ff;cursor:pointer}
        .progress-bar{height:3px;background:#19233c;border-radius:4px;margin:1rem 0;display:none}
        .progress-fill{width:0%;height:100%;background:linear-gradient(90deg,#00d4ff,#ff9a44);border-radius:4px}
        .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:1rem;margin:1.5rem 0}
        .stat-tile{background:#0a1022aa;border-radius:1.5rem;padding:1rem;text-align:center;border:1px solid #2d3a5a}
        .stat-tile i{font-size:1.6rem;color:#ffaa55}
        .stat-number{font-size:1.6rem;font-weight:700;background:linear-gradient(135deg,#f0f9ff,#7dd3fc);-webkit-background-clip:text;background-clip:text;color:transparent}
        .results-card{margin-top:2rem;background:rgba(5,10,22,0.7);backdrop-filter:blur(12px);border-radius:1.8rem;padding:1.5rem;display:none}
        .results-card.active{display:block}
        .table-wrap{overflow-x:auto;max-height:450px;overflow-y:auto}
        table{width:100%;border-collapse:collapse}
        th{text-align:left;padding:1rem;background:#0e1a2f;color:#7bc5ff;position:sticky;top:0}
        td{padding:0.8rem;border-bottom:1px solid #1f2a46}
        .hostname{color:#84d6ff;font-family:monospace}
        .port-chip{background:#00ff8820;border:1px solid #1eff9e;border-radius:20px;padding:0.2rem 0.7rem;font-size:0.7rem;display:inline-block;margin:0.2rem;cursor:pointer}
        .action-icons i{margin:0 5px;cursor:pointer;color:#6f8fcc}
        .loading{text-align:center;padding:2rem;display:none}
        .loading.active{display:block}
        .spinner{width:48px;height:48px;border:3px solid #2a3a70;border-top:3px solid #00d4ff;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 1rem}
        @keyframes spin{to{transform:rotate(360deg)}}
        .error{background:#ff336620;border-left:4px solid #ff6670;padding:0.8rem;border-radius:1rem;margin:1rem 0;display:none}
        .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#1f2c48e6;backdrop-filter:blur(12px);padding:0.5rem 1.5rem;border-radius:3rem;border:1px solid #00d4ff;font-size:0.8rem;opacity:0;transition:0.2s;z-index:1000}
        footer{text-align:center;margin-top:2rem;font-size:0.7rem;color:#4c6190}
        @media (max-width:700px){.brand h1{font-size:1.2rem}.stat-number{font-size:1.3rem}}
    </style>
</head>
<body>
<div class="splash" id="splash">
    <div class="splash-logo"><i class="fas fa-shield-halbed"></i></div>
    <h2>SubfinderX</h2>
    <p>Mahboub Million · OSINT Tool</p>
</div>

<div class="container">
    <div class="header">
        <div class="brand"><i class="fas fa-bolt"></i><h1>SubfinderX</h1></div>
        <div style="display:flex;gap:0.8rem">
            <div class="owner-badge"><i class="fas fa-crown"></i> MAHBOUB MILLION</div>
            <a href="https://t.me/VPSPLUSMODE" class="telegram-btn"><i class="fab fa-telegram"></i> Channel</a>
        </div>
    </div>

    <div class="card">
        <div class="input-group">
            <input type="text" id="domainInput" class="domain-input" placeholder="example.com">
            <button class="btn-scan" onclick="findSubdomains()"><i class="fas fa-search"></i> Scan</button>
        </div>
        <div class="toggle-group">
            <label class="toggle-item"><input type="checkbox" id="resolveIPs" checked> 🔍 Resolve IPs</label>
            <label class="toggle-item"><input type="checkbox" id="scanPorts"> 🔌 Port Scan</label>
        </div>
        <div class="tools-bar">
            <input type="text" id="ipInput" placeholder="IP → Hostname" style="background:#0f172f;border-radius:2rem;padding:0.4rem 1rem;color:#fff;flex:2">
            <button class="tool-btn" onclick="reverseIP()"><i class="fas fa-exchange-alt"></i> Reverse</button>
            <button class="tool-btn" onclick="copyAll()"><i class="fas fa-copy"></i> Copy</button>
            <button class="tool-btn" onclick="exportTXT()"><i class="fas fa-file-alt"></i> TXT</button>
        </div>
        <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
        <div class="stats" id="stats" style="display:none">
            <div class="stat-tile"><i class="fas fa-globe"></i><div class="stat-number" id="totalCount">0</div><div>Subdomains</div></div>
            <div class="stat-tile"><i class="fas fa-check"></i><div class="stat-number" id="activeCount">0</div><div>Active</div></div>
            <div class="stat-tile"><i class="fas fa-server"></i><div class="stat-number" id="ipCount">0</div><div>IPs</div></div>
            <div class="stat-tile"><i class="fas fa-plug"></i><div class="stat-number" id="portCount">0</div><div>Open Ports</div></div>
            <div class="stat-tile"><i class="fas fa-clock"></i><div class="stat-number" id="timeCount">0s</div><div>Time</div></div>
        </div>
    </div>

    <div class="loading" id="loading"><div class="spinner"></div><p id="loadingText">Scanning sources...</p></div>
    <div class="error" id="error"><span id="errorText"></span></div>
    <div class="results-card" id="results"><div class="table-wrap"><table><thead><tr><th>#</th><th>Subdomain</th><th>IP</th><th>Ports</th><th>Actions</th></tr></thead><tbody id="tableBody"></tbody></table></div></div>
    <footer>⚡ Mahboub Million · Professional OSINT Tool</footer>
</div>
<div class="toast" id="toast">✓ Done</div>

<script>
    let currentData=[];
    const PORTS=[80,443,22,21,25,3306,5432,6379,8080,8443];
    
    async function fetchCRT(d){try{let r=await fetch(`https://crt.sh/?q=%.${d}&output=json`);let j=await r.json();let s=new Set();if(Array.isArray(j))j.forEach(e=>{if(e.name_value)e.name_value.split('\n').forEach(n=>{let c=n.trim().toLowerCase();if(c&&c.endsWith(d)&&c!==d)s.add(c);})});return[...s];}catch(e){return[]}}
    async function fetchHT(d){try{let r=await fetch(`https://api.hackertarget.com/hostsearch/?q=${d}`);let t=await r.text();if(t.includes('error'))return[];return t.split('\n').map(l=>l.split(',')[0]).filter(s=>s&&s.includes('.'));}catch(e){return[]}}
    async function fetchAlien(d){try{let r=await fetch(`https://otx.alienvault.com/api/v1/indicators/domain/${d}/passive_dns`);let j=await r.json();let s=new Set();if(j.passive_dns)j.passive_dns.forEach(rec=>{if(rec.hostname&&rec.hostname.endsWith(d))s.add(rec.hostname.toLowerCase());});return[...s];}catch(e){return[]}}
    
    async function getAllSubs(domain){
        let sources=[fetchCRT,fetchAlien,fetchHT];
        let all=new Set();
        for(let src of sources){let res=await src(domain);res.forEach(r=>all.add(r));}
        return [...all].sort();
    }
    
    async function resolveIP(host){try{let r=await fetch(`https://dns.google/resolve?name=${host}&type=A`);let d=await r.json();if(d.Answer&&d.Answer[0])return d.Answer[0].data;return'-';}catch(e){return'-'}}
    
    async function findSubdomains(){
        let domain=document.getElementById('domainInput').value.trim().toLowerCase();
        if(!domain){showError('Enter domain');return;}
        document.getElementById('loading').classList.add('active');
        document.getElementById('results').classList.remove('active');
        document.getElementById('stats').style.display='none';
        document.getElementById('progressBar').style.display='block';
        let start=Date.now();
        try{
            let subs=await getAllSubs(domain);
            if(subs.length===0){showError('No subdomains found');reset();return;}
            subs=[...new Set(subs)];
            document.getElementById('totalCount').innerText=subs.length;
            let resolveFlag=document.getElementById('resolveIPs').checked;
            let data=[];
            for(let i=0;i<subs.length;i++){
                let ip='-';
                if(resolveFlag)ip=await resolveIP(subs[i]);
                data.push({subdomain:subs[i],ip,ports:[]});
                document.getElementById('progressFill').style.width=`${((i+1)/subs.length)*100}%`;
                document.getElementById('ipCount').innerText=i+1;
            }
            currentData=data;
            document.getElementById('timeCount').innerText=((Date.now()-start)/1000).toFixed(1)+'s';
            document.getElementById('stats').style.display='grid';
            renderTable(data);
            showToast(`Found ${subs.length} subdomains`);
        }catch(e){showError('Error: '+e.message);}
        finally{reset();}
        function reset(){document.getElementById('loading').classList.remove('active');document.getElementById('progressBar').style.display='none';}
    }
    
    function renderTable(data){
        let tbody=document.getElementById('tableBody');
        tbody.innerHTML='';
        data.forEach((item,i)=>{
            let row=tbody.insertRow();
            row.insertCell(0).innerText=i+1;
            row.insertCell(1).innerHTML=`<span class="hostname">${item.subdomain}</span>`;
            row.insertCell(2).innerText=item.ip;
            row.insertCell(3).innerHTML='<span style="color:#666">—</span>';
            row.insertCell(4).innerHTML=`<div class="action-icons"><i class="fas fa-copy" onclick="copyToClipboard('${item.subdomain}')"></i><i class="fas fa-external-link-alt" onclick="window.open('https://${item.subdomain}')"></i></div>`;
        });
        document.getElementById('results').classList.add('active');
    }
    
    async function reverseIP(){let ip=document.getElementById('ipInput').value.trim();if(!ip){showError('Enter IP');return;}try{let r=await fetch(`https://dns.google/resolve?name=${ip}&type=PTR`);let d=await r.json();if(d.Answer&&d.Answer[0])showToast(`Host: ${d.Answer[0].data}`);else showToast('No PTR record');}catch(e){showError('Reverse failed');}}
    function copyAll(){if(!currentData.length)return;let t=currentData.map(x=>x.subdomain).join('\n');copyToClipboard(t);showToast(`${currentData.length} hosts copied`);}
    function exportTXT(){if(!currentData.length)return;let txt=`# SubfinderX\n# ${new Date().toLocaleString()}\n\n`;currentData.forEach(x=>txt+=`${x.subdomain} | ${x.ip}\n`);download(txt,`subdomains_${Date.now()}.txt`);}
    function download(content,name){let a=document.createElement('a');let blob=new Blob([content],{type:'text/plain'});a.href=URL.createObjectURL(blob);a.download=name;a.click();URL.revokeObjectURL(a.href);}
    function copyToClipboard(t){navigator.clipboard.writeText(t);showToast(`Copied: ${t.substring(0,40)}`);}
    function showToast(msg){let t=document.getElementById('toast');t.innerText=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}
    function showError(msg){let e=document.getElementById('error');document.getElementById('errorText').innerHTML=msg;e.classList.add('active');setTimeout(()=>e.classList.remove('active'),3000);}
    
    setTimeout(()=>document.getElementById('splash').classList.add('hide'),1500);
    document.getElementById('domainInput').addEventListener('keypress',e=>{if(e.key==='Enter')findSubdomains();});
</script>
</body>
</html>
